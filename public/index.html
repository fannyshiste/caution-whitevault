<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caution White Vault Paris</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
    h1 { font-size: 1.4em; margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    #card-element { border: 1px solid #ccc; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    button { background: black; color: white; padding: 14px 24px; border: none; border-radius: 6px; width: 100%; font-size: 1em; cursor: pointer; }
    button:disabled { background: #999; }
    #message { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; }
    .success { background: #e6f4ea; color: #2d6a4f; }
    .error { background: #fdecea; color: #b00020; }
  </style>
</head>
<body>
  <h1>Caution White Vault Paris</h1>
  <p id="montant-texte">Autorisation de caution — aucun débit immédiat</p>

  <div id="card-element"></div>
  <button id="submit-btn">Autoriser la caution</button>
  <div id="message"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const montant = parseInt(params.get('montant')) || 30000;

    document.getElementById('montant-texte').textContent =
      `Autorisation de caution : ${(montant / 100).toFixed(2)} € — aucun débit immédiat`;

    const stripe = Stripe('pk_test_51TdrreBExSFNEGhhU0Az4izP4M3Bo2XMiZ2Gj20JceQJy7QJ4yNRU1QAnRTT3Rl7uVss1G5mY5UGX5bKNziJtMR300v30FmU7M');
    const elements = stripe.elements();
    const card = elements.create('card');
    card.mount('#card-element');

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Traitement...';

      const res = await fetch('/api/create-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: montant })
      });

      const { clientSecret, error: serverError } = await res.json();

      if (serverError) {
        showMessage(serverError, 'error');
        btn.disabled = false;
        btn.textContent = 'Autoriser la caution';
        return;
      }

      const { error } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: { card }
      });

      if (error) {
        showMessage(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Autoriser la caution';
      } else {
        showMessage('✅ Caution autorisée. Aucun débit effectué.', 'success');
        btn.textContent = 'Autorisé';
      }
    });

    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = type;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
